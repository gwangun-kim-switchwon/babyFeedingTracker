<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 40px; background: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .icon { width: 512px; height: 512px; border-radius: 108px; background: #8CC9B0; position: relative; overflow: hidden; }
  .face { width: 200px; height: 200px; background: white; border-radius: 50%; position: absolute; top: 180px; left: 156px; }
  .eye { width: 24px; height: 24px; background: #2D2626; border-radius: 50%; position: absolute; }
  .eye.left { top: 250px; left: 220px; }
  .eye.right { top: 250px; left: 300px; }
  .eye-highlight { width: 9px; height: 9px; background: white; border-radius: 50%; position: absolute; }
  .eye-highlight.left { top: 247px; left: 217px; }
  .eye-highlight.right { top: 247px; left: 297px; }
  .cheek { width: 40px; height: 28px; background: rgba(244, 160, 182, 0.45); border-radius: 50%; position: absolute; }
  .cheek.left { top: 270px; left: 180px; }
  .cheek.right { top: 270px; left: 310px; }
  .mouth { position: absolute; top: 290px; left: 234px; width: 60px; height: 30px; border: none; border-bottom: 7px solid #2D2626; border-radius: 0 0 50% 50%; }
  .bottle { position: absolute; top: 80px; right: 80px; }
  .bottle-body { width: 40px; height: 70px; background: white; border-radius: 0 0 8px 8px; position: relative; }
  .bottle-neck { width: 30px; height: 20px; background: white; border-radius: 4px 4px 0 0; margin: 0 auto; position: relative; left: -5px; margin-left: 5px; }
  .bottle-nipple { width: 20px; height: 18px; background: rgba(255,255,255,0.9); border-radius: 50% 50% 0 0; margin: 0 auto; position: relative; left: -10px; margin-left: 10px; }
  .bottle-line { height: 2px; background: #8CC9B0; position: absolute; left: 4px; }
  .bottle-line:nth-child(1) { top: 15px; width: 14px; }
  .bottle-line:nth-child(2) { top: 28px; width: 20px; }
  .bottle-line:nth-child(3) { top: 41px; width: 14px; }
  .bottle-line:nth-child(4) { top: 54px; width: 20px; }
  .heart { position: absolute; top: 100px; left: 85px; width: 45px; height: 40px; }
  .heart:before, .heart:after { content: ''; position: absolute; top: 0; width: 22px; height: 36px; border-radius: 22px 22px 0 0; }
  .heart:before { left: 0; transform: rotate(-45deg); transform-origin: bottom left; background: rgba(244, 160, 182, 0.7); }
  .heart:after { right: 0; transform: rotate(45deg); transform-origin: bottom right; background: rgba(244, 160, 182, 0.7); }
  .star { position: absolute; color: rgba(255,255,255,0.3); font-size: 20px; }
  .star:nth-child(1) { top: 60px; left: 160px; }
  .star:nth-child(2) { top: 140px; right: 160px; font-size: 14px; }
  .star:nth-child(3) { bottom: 100px; left: 100px; font-size: 16px; }
</style>
</head>
<body>
<div class="icon">
  <span class="star">&#10022;</span>
  <span class="star">&#10022;</span>
  <span class="star">&#10022;</span>
  <div class="heart"></div>
  <div class="bottle">
    <div class="bottle-nipple"></div>
    <div class="bottle-neck"></div>
    <div class="bottle-body">
      <div class="bottle-line"></div>
      <div class="bottle-line"></div>
      <div class="bottle-line"></div>
      <div class="bottle-line"></div>
    </div>
  </div>
  <div class="face"></div>
  <div class="eye left"></div>
  <div class="eye right"></div>
  <div class="eye-highlight left"></div>
  <div class="eye-highlight right"></div>
  <div class="cheek left"></div>
  <div class="cheek right"></div>
  <div class="mouth"></div>
</div>
</body>
</html>
